<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faces of Funseven Slots - Premium Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at center, #1e1e38 0%, #0a0a14 100%);
            font-family: 'Segoe UI', BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #00f2fe, #4facfe, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }
        .header p {
            color: #a0a0ba;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .slot-cabinet {
            background: linear-gradient(145deg, #1f2336, #111322);
            border: 4px solid #2a2f4a;
            border-top: 6px solid #4facfe;
            border-bottom: 6px solid #ff007f;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 30px 70px rgba(0,0,0,0.8), 
                        inset 0 0 40px rgba(0, 242, 254, 0.1),
                        0 0 30px rgba(79, 172, 254, 0.2);
            width: 100%;
            max-width: 900px; /* Wider to support enhanced reel widths */
            position: relative;
        }
        .glass-header {
            background: rgba(13, 17, 23, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .stat-box {
            text-align: center;
            flex: 1;
        }
        .stat-box:not(:last-child) {
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-label {
            font-size: 0.8rem;
            color: #7982a8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            display: block;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00f2fe;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        }
        .stat-value.win-glow {
            color: #39d353;
            text-shadow: 0 0 15px rgba(57, 211, 83, 0.6);
        }
        .reels-window {
            display: flex;
            background: #161722;
            border: 6px solid #0b0c16;
            border-radius: 20px;
            overflow: hidden;
            height: 240px; /* Taller reels */
            position: relative;
            box-shadow: inset 0 15px 30px rgba(0,0,0,0.8);
        }
        .reel {
            flex: 1;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e2030, #131420 20%, #131420 80%, #1e2030);
            border-right: 2px solid rgba(255, 255, 255, 0.05);
        }
        .reel:last-child {
            border-right: none;
        }
        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            transition: transform 0.1s ease-out;
        }
        .symbol {
            height: 240px; /* Matching the container height */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px; /* Spacious framing */
        }
        .symbol img {
            width: 125px; /* Defined larger width */
            height: 125px; /* Symmetric shape */
            object-fit: cover;
            border-radius: 20px;
            border: 3px solid #ffca28;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5), 0 0 10px rgba(255, 202, 40, 0.2);
            transition: transform 0.2s;
        }
        .symbol.classic {
            font-size: 6rem; /* Huge classic emojis */
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.5));
            user-select: none;
        }
        .message-banner {
            margin: 25px 0 10px 0;
            text-align: center;
            min-height: 30px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffca28;
            text-shadow: 0 0 10px rgba(255, 202, 40, 0.3);
            letter-spacing: 0.5px;
        }
        .control-board {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            align-items: center;
        }
        button {
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 800;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-action {
            background: #2a2f4a;
            color: #cbd5e1;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-action:hover:not(:disabled) {
            background: #353b5e;
            color: #fff;
            transform: translateY(-1px);
        }
        .btn-spin {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #05050a;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            flex: 2;
        }
        .btn-spin:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.7);
        }
        button:disabled {
            background: #1e2030 !important;
            color: #4a4f6e !important;
            box-shadow: none !important;
            cursor: not-allowed;
            transform: none !important;
            border: 1px solid transparent;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Faces of Funseven</h1>
        <p>Edizione Premium Deluxe</p>
    </div>

    <div class="slot-cabinet">
        <div class="glass-header">
            <div class="stat-box">
                <span class="stat-label">Crediti</span>
                <div id="credits" class="stat-value">1500</div>
            </div>
            <div class="stat-box">
                <span class="stat-label">Puntata</span>
                <div id="bet" class="stat-value">25</div>
            </div>
            <div class="stat-box">
                <span class="stat-label">Vincita</span>
                <div id="win" class="stat-value win-glow">0</div>
            </div>
        </div>

        <div class="reels-window">
            <!-- Reel 0 -->
            <div class="reel" id="reel0">
                <div class="reel-strip" id="strip0"></div>
            </div>
            <!-- Reel 1 -->
            <div class="reel" id="reel1">
                <div class="reel-strip" id="strip1"></div>
            </div>
            <!-- Reel 2 -->
            <div class="reel" id="reel2">
                <div class="reel-strip" id="strip2"></div>
            </div>
            <!-- Reel 3 -->
            <div class="reel" id="reel3">
                <div class="reel-strip" id="strip3"></div>
            </div>
            <!-- Reel 4 -->
            <div class="reel" id="reel4">
                <div class="reel-strip" id="strip4"></div>
            </div>
        </div>

        <div class="message-banner" id="message">Scegli la puntata e gira i rulli!</div>

        <div class="control-board">
            <button class="btn-action" id="btn-bet-less">- Bet</button>
            <button class="btn-action" id="btn-bet-more">+ Bet</button>
            <button class="btn-spin" id="btn-spin">Spin</button>
        </div>
    </div>

        ];

        const SYMBOLS = [
            { type: 'face', id: 0, content: faceImages[0] },
            { type: 'face', id: 1, content: faceImages[1] },
            { type: 'face', id: 2, content: faceImages[2] },
            { type: 'face', id: 3, content: faceImages[3] },
            { type: 'face', id: 4, content: faceImages[4] },
            { type: 'classic', id: 5, content: '🍒' },
            { type: 'classic', id: 6, content: '🍋' },
            { type: 'classic', id: 7, content: '🔔' },
            { type: 'classic', id: 8, content: '7️⃣' },
            { type: 'classic', id: 9, content: '🍀' }
        ];

        let credits = 1500;
        let bet = 25;
        let isSpinning = false;
        const SYMBOL_HEIGHT = 240;

        function initReels() {
            for (let r = 0; r < 5; r++) {
                const strip = document.getElementById(`strip${r}`);
                let stripHTML = '';
                for (let i = 0; i < 40; i++) {
                    const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    stripHTML += createSymbolHTML(sym);
                }
                strip.innerHTML = stripHTML;
                strip.style.transform = `translateY(0px)`;
            }
        }

        function createSymbolHTML(sym) {
            if (sym.type === 'face') {
                return `<div class="symbol"><img src="${sym.content}" alt="Face"></div>`;
            } else {
                return `<div class="symbol classic">${sym.content}</div>`;
            }
        }

        document.getElementById('btn-bet-more').addEventListener('click', () => {
            if (isSpinning) return;
            if (bet < 200) {
                bet += 25;
                document.getElementById('bet').innerText = bet;
            }
        });

        document.getElementById('btn-bet-less').addEventListener('click', () => {
            if (isSpinning) return;
            if (bet > 25) {
                bet -= 25;
                document.getElementById('bet').innerText = bet;
            }
        });

        document.getElementById('btn-spin').addEventListener('click', () => {
            if (isSpinning) return;
            if (credits < bet) {
                document.getElementById('message').innerText = "Crediti insufficienti!";
                return;
            }

            credits -= bet;
            document.getElementById('credits').innerText = credits;
            document.getElementById('win').innerText = 0;
            document.getElementById('message').innerText = "Buona fortuna...";
            
            isSpinning = true;
            document.getElementById('btn-spin').disabled = true;
            document.getElementById('btn-bet-less').disabled = true;
            document.getElementById('btn-bet-more').disabled = true;

            const finalResult = [];

            for (let r = 0; r < 5; r++) {
                const strip = document.getElementById(`strip${r}`);
                const finalSymbolIndex = Math.floor(Math.random() * SYMBOLS.length);
                const finalSymbol = SYMBOLS[finalSymbolIndex];
                finalResult.push(finalSymbol);

                let stripHTML = '';
                for (let i = 0; i < 25 + (r * 5); i++) {
                    const sym = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                    stripHTML += createSymbolHTML(sym);
                }
                stripHTML += createSymbolHTML(finalSymbol);
                stripHTML += createSymbolHTML(SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)]);

                strip.innerHTML = stripHTML;
                
                strip.style.transition = 'none';
                strip.style.transform = 'translateY(0px)';
                
                strip.offsetHeight;

                const totalSymbols = strip.children.length;
                const stopY = -((totalSymbols - 2) * SYMBOL_HEIGHT);

                strip.style.transition = `transform ${2 + r * 0.4}s cubic-bezier(0.1, 0.8, 0.3, 1)`;
                strip.style.transform = `translateY(${stopY}px)`;
            }

            setTimeout(() => {
                checkWin(finalResult);
                isSpinning = false;
                document.getElementById('btn-spin').disabled = false;
                document.getElementById('btn-bet-less').disabled = false;
                document.getElementById('btn-bet-more').disabled = false;
            }, 2000 + (4 * 400));
        });

        function checkWin(results) {
            const counts = {};
            results.forEach(sym => {
                counts[sym.id] = (counts[sym.id] || 0) + 1;
            });

            let maxCombo = 1;
            let winningId = null;
            for (let id in counts) {
                if (counts[id] > maxCombo) {
                    maxCombo = counts[id];
                    winningId = id;
                }
            }

            let winAmount = 0;
            if (maxCombo >= 2) {
                let multiplier = 0;
                if (maxCombo === 2) multiplier = 2;
                if (maxCombo === 3) multiplier = 6;
                if (maxCombo === 4) multiplier = 25;
                if (maxCombo === 5) multiplier = 150;

                const matchedSym = SYMBOLS.find(s => s.id == winningId);
                if (matchedSym && matchedSym.type === 'face') {
                    multiplier *= 1.5;
                }

                winAmount = Math.floor(bet * multiplier);
            }

            if (winAmount > 0) {
                credits += winAmount;
                document.getElementById('credits').innerText = credits;
                document.getElementById('win').innerText = winAmount;
                
                if (maxCombo === 5) {
                    document.getElementById('message').innerText = `💥 JACKPOT ASSOLUTO! +${winAmount} CREDITI! 💥`;
                } else {
                    document.getElementById('message').innerText = `Grande! Hai vinto ${winAmount} crediti! 🎉`;
                }
            } else {
                document.getElementById('message').innerText = "Ritenta, sarai più fortunato!";
            }
        }

        initReels();
    </script>
